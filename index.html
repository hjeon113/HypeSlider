<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hype Dial</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Playfair+Display:wght@900&family=Space+Grotesk:wght@700&family=Bebas+Neue&family=DM+Serif+Display&family=Outfit:wght@800&family=Anton&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="controls">
      <span id="dial-label">Hype</span>
      <input type="range" id="dial" min="0" max="100" value="0" step="0.25" />
    </div>
    <script src="script.js"></script>
  </body>
</html>
